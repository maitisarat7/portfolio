    <main class="contact-page">
      <div class="contact-container">
        <section class="contact-card">
          <div class="contact-intro">
            <h2>PROTEASEE</h2>
            <p>Please provide your contact information:</p>
            <span>Our team will reach out to you for a demo.</span>
          </div>

          <form class="contact-form" action="#" method="post">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" placeholder="+1 201-555-0123" />
            </div>
            <div class="form-group">
              <label for="company">Company Name</label>
              <input type="text" id="company" name="company" placeholder="Company name" />
            </div>
            <div class="form-group">
              <label for="title">Your Title</label>
              <input type="text" id="title" name="title" placeholder="Job title" />
            </div>
            <div class="form-group">
              <label for="comments">Comments</label>
              <textarea id="comments" name="comments" placeholder="How can we help?"></textarea>
            </div>
            <button type="submit">Contact Me!</button>
          </form>
        </section>

        <aside class="contact-illustration">
          <div class="illustration-card">
            <!-- DNA double helix illustration (vector) -->
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-labelledby="dnaTitle" role="img">
              <title id="dnaTitle">DNA double helix</title>
              <rect x="0" y="0" width="200" height="200" rx="12" fill="#f6f8fa" />
              <!-- Sine-like backbones -->
              <path d="M40 10 C80 40, 20 80, 60 110 C100 140, 40 180, 80 190" stroke="#2b7a78" stroke-width="6" fill="none" stroke-linecap="round" />
              <path d="M160 10 C120 40, 180 80, 140 110 C100 140, 160 180, 120 190" stroke="#e85d04" stroke-width="6" fill="none" stroke-linecap="round" />
              <!-- Rungs (base pairs) -->
              <g stroke="#074f57" stroke-width="3" stroke-linecap="round">
                <line x1="56" y1="30" x2="144" y2="30" />
                <line x1="44" y1="56" x2="156" y2="56" />
                <line x1="60" y1="82" x2="140" y2="82" />
                <line x1="48" y1="108" x2="152" y2="108" />
                <line x1="68" y1="134" x2="132" y2="134" />
                <line x1="56" y1="160" x2="144" y2="160" />
              </g>
              <!-- Small circles on backbone ends -->
              <circle cx="40" cy="10" r="4" fill="#2b7a78" />
              <circle cx="160" cy="10" r="4" fill="#e85d04" />
              <circle cx="80" cy="190" r="4" fill="#2b7a78" />
              <circle cx="120" cy="190" r="4" fill="#e85d04" />
            </svg>
          </div>
        </aside>
      </div>
    </main>
  </body>
